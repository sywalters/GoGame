[tools]
python = "3.13"
node = "22"

[tasks.install]
description = "Install backend dependencies"
run = "pip install -r backend/requirements.txt"

[tasks.dev-backend]
description = "Start the FastAPI backend server"
run = "python -m uvicorn backend.main:app --reload --port 8008"

[tasks.dev-frontend]
description = "Start a frontend (pass framework name: react, nextjs, angular)"
run = "bash start_frontend.sh"

[tasks.lint]
description = "Run ruff linter on backend"
run = "python -m ruff check backend/"

[tasks.lint-fix]
description = "Auto-fix linting issues"
run = "python -m ruff check backend/ --fix"

[tasks.fmt]
description = "Check formatting on backend"
run = "python -m ruff format --check backend/"

[tasks.fmt-fix]
description = "Auto-format backend code"
run = "python -m ruff format backend/"
